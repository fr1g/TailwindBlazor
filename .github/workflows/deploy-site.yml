name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      TAILWIND_VERSION: "4.1.18"
    steps:
      - uses: actions/checkout@v4

      - name: Download Tailwind CSS CLI
        run: |
          curl -sLO "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x tailwindcss-linux-x64

      - name: Build CSS
        run: ./tailwindcss-linux-x64 -i site/src/app.css -o site/wwwroot/css/tailwind.css --minify

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/wwwroot --project-name=tailwindblazor
